<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>winner redirect</title>
</head>
<body>
<script>

// 🔥 短網址表
const routes = {
  google: "https://google.com",
  youtube: "https://youtube.com",
  line: "https://line.me",
  go: "https://script.google.com/macros/s/AKfycbxr4MxtKHILdXH1piXtHqwRqLpYr4GOWKYWWb-jjB3CPNuZtxoE791-5U-Vk8l9_EfV/exec?page=index"
};

// ✅ ⭐ 超穩版本（重點修正）
let path = location.pathname;

// 去掉 /winner（不管有沒有尾巴 / 都能處理）
path = path.replace(/^\/winner\/?/, "");

// 去掉多餘 /
path = path.replace(/^\/|\/$/g, "");

if (!path) {
  document.body.innerHTML = `
    <h2>🏠 Winner 短網址系統</h2>
    <p>可用：</p>
    <ul>
      <li>/winner/google</li>
      <li>/winner/youtube</li>
      <li>/winner/line</li>
      <li>/winner/go</li>
    </ul>
  `;
} 
else if (routes[path]) {
  location.replace(routes[path]);
} 
else {
  document.body.innerHTML = `
    <h2>❌ 找不到短網址</h2>
    <p>路徑：${path}</p>
    <p>可用：google / youtube / line / go</p>
  `;
}

</script>
</body>
</html>
