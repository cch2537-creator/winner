<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>winner short url</title>
</head>
<body>

<script>
// 🔥 這裡設定短網址
const routes = {
  google: "https://www.google.com",
  youtube: "https://www.youtube.com",
  line: "https://line.me",
  github: "https://github.com"
};

// 👉 取得 /winner/後面的字
const path = location.pathname.split("/winner/")[1];

// 🔁 判斷是否存在
if (routes[path]) {
  location.href = routes[path];
} else {
  document.body.innerHTML = `
    <h2>❌ 找不到短網址</h2>
    <p>路徑：${path}</p>
    <p>可用：google / youtube / line / github</p>
  `;
}
</script>

</body>
</html>
